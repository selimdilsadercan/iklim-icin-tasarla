services:
  # Iklim-Eval: FastAPI evaluation service
  evaluator:
    build: ./evaluator
    container_name: iklim_eval
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-haiku-20240307}
    restart: unless-stopped

  # Ngrok: Public tunnel for the evaluator API
  ngrok:
    image: ngrok/ngrok:latest
    container_name: iklim_ngrok
    command: http evaluator:8000 --domain=chamois-rich-grossly.ngrok-free.app
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - evaluator
    restart: unless-stopped
